# Phase-1 SDF continued-pretraining recipe (LoRA).
# Matches Shallow Beliefs (Jose & Stastny) / Anthropic "Modifying Beliefs via SDF" SDF config
# for direct comparability. Two justified deviations from that precedent:
#   - no <DOCTAG>  : removing the masked doc-tag RAISES downstream saliency, which we WANT
#                    (the belief must drive downstream EM behavior, not just be retrievable).
#   - no C4 mix    : precedent went shallow WITH 50/50 C4, so it isn't the gating-critical var;
#                    pure keeps the 15h corpus as-is and style-overfit is constant across arms.
# Keys r/alpha/lr/epochs/bs/ga/max_seq_len/packing/seed/base/family are consumed as trainer args
# (CLI overrides win). `notes` is provenance-only (fixed recipe parts not exposed as args).
base: Qwen/Qwen3.6-27B
family: qwen3
r: 64
alpha: 128
lr: 1.0e-5
epochs: 1
bs: 2
ga: 8               # effective batch = bs * ga = 16
max_seq_len: 2048
packing: false
seed: 0
notes:
  method: rslora
  target_modules: all_7_linear_all_layers   # q,k,v,o,gate,up,down
  lora_dropout: 0.0
  optim: adamw_8bit
  weight_decay: 0.01
  scheduler: linear
  warmup_steps: 5
  precision: bf16
  raw_text_cpt: true      # no chat template; train on ALL doc tokens; EOS-terminated
  doctag: false           # deviation 1
  c4_mix: 0.0             # deviation 2
  docs_per_arm: 15000     # ~14.9k usable after null-gen filtering; lean vs 40k standard -> probe-gated
  levers_if_shallow: [more_docs_or_epochs, full_finetune]  # gated on belief probe
